<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boston Bikeshare Atlas — insights from 24M Bluebikes trips</title>
<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
  /* Data palette follows City of Boston brand: Optimistic Blue #288BE4,
     Freedom Trail Red #FB4D42, Charles Blue depths for chrome.
     Rule: blue = supply/positive, red = demand/attention, gray = muted. */
  :root {
    --bg-deep: #081420; --bg-panel: #0b1b2bd9; --bg-card: #10263a;
    --border: #1e3852; --text: #f2f6fa; --text2: #a9bccd; --muted: #5d7288;
    --ob: #288BE4; --ob-light: #8ABEEE; --ftr: #FB4D42; --ftr-light: #FF9C94;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg-deep); color: var(--text); height: 100vh; overflow: hidden; }
  #map { position: absolute; inset: 0; }

  .panel {
    position: absolute; top: 14px; left: 14px; bottom: 14px;
    width: 372px; z-index: 10;
    background: var(--bg-panel); backdrop-filter: blur(12px);
    border: 1px solid var(--border); border-radius: 12px;
    display: flex; flex-direction: column; overflow: hidden;
  }
  .panel-head { padding: 16px 16px 10px; }
  .panel-head h1 {
    font-family: 'Montserrat', sans-serif; font-size: 17px; font-weight: 800;
    text-transform: uppercase; letter-spacing: .04em; color: var(--ob);
  }
  .panel-head .sub { font-size: 10px; color: var(--muted); font-family: 'JetBrains Mono', monospace; letter-spacing: .06em; margin-top: 3px; }

  .statrow { display: flex; gap: 6px; padding: 0 16px 10px; flex-wrap: wrap; }
  .stat { background: var(--bg-card); border: 1px solid var(--border); border-top: 3px solid var(--ob); border-radius: 6px; padding: 5px 9px; }
  .stat b { font-size: 13px; font-family: 'JetBrains Mono', monospace; color: var(--text); display: block; }
  .stat span { font-size: 8.5px; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; font-family: 'JetBrains Mono', monospace; }

  .views { display: flex; flex-wrap: wrap; gap: 5px; padding: 0 16px 6px; }
  .vhint { padding: 0 16px 8px; font-size: 9.5px; color: var(--muted); font-family: 'JetBrains Mono', monospace; }
  .chip {
    padding: 5px 10px; border-radius: 6px; border: 1px solid var(--border);
    background: transparent; color: var(--muted); font-size: 11px; cursor: pointer;
    font-family: 'JetBrains Mono', monospace; transition: all .15s;
  }
  .chip.active { background: #12314d; color: var(--text); border-color: var(--ob); }
  .chip:hover { border-color: var(--muted); }
  .chip.lanes.active { color: #4ade80; border-color: #22c55e66; background: #0d2a1c; }

  .story { flex: 1; overflow-y: auto; padding: 4px 16px 16px; }
  .story::-webkit-scrollbar { width: 5px; }
  .story::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  .story h2 { font-family: 'Montserrat', sans-serif; font-size: 13px; font-weight: 700; margin: 10px 0 6px; color: var(--text); }
  .story p { font-size: 12px; line-height: 1.65; color: var(--text2); margin-bottom: 8px; }
  .story p b { color: var(--text); }
  .legend { margin: 8px 0; padding: 9px 11px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; }
  .legend .ltitle { font-size: 9px; color: var(--muted); font-family: 'JetBrains Mono', monospace; text-transform: uppercase; letter-spacing: .08em; margin-bottom: 5px; }
  .legend .row { display: flex; align-items: center; gap: 7px; font-size: 10.5px; color: var(--text2); padding: 2px 0; font-family: 'JetBrains Mono', monospace; }
  .legend .swatch { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
  .legend .line { width: 16px; height: 3px; border-radius: 2px; flex-shrink: 0; }

  .toplist { margin-top: 8px; }
  .toplist .item {
    display: flex; align-items: center; gap: 8px;
    padding: 7px 9px; margin-bottom: 5px;
    background: var(--bg-card); border: 1px solid var(--border); border-radius: 7px;
    cursor: pointer; font-size: 11px; color: var(--text2); transition: all .15s;
  }
  .toplist .item:hover { border-color: var(--ob); color: var(--text); }
  .toplist .rank { font-family: 'JetBrains Mono', monospace; font-weight: 800; color: var(--ftr); flex-shrink: 0; }
  .toplist .val { margin-left: auto; font-family: 'JetBrains Mono', monospace; color: var(--ob-light); flex-shrink: 0; }

  .stlink { color: var(--ob-light); cursor: pointer; border-bottom: 1px dotted #8ABEEE66; }
  .stlink:hover { color: #c4dcf2; }

  .yearchips { display: flex; flex-wrap: wrap; gap: 4px; margin: 8px 0; }
  .ychip {
    padding: 3px 8px; border-radius: 5px; font-size: 10px;
    font-family: 'JetBrains Mono', monospace; cursor: pointer;
    border: 1px solid var(--border); color: var(--muted); background: transparent;
  }
  .ychip.on { color: var(--text); border-color: currentColor; }
  .ychip.subtoggle.on { color: var(--ftr); background: #3a1512; }

  .bars { margin: 6px 0 2px; }
  .bars .brow { display: flex; align-items: center; gap: 6px; padding: 1.5px 0; }
  .bars .blab { width: 42px; font-size: 9.5px; font-family: 'JetBrains Mono', monospace; color: var(--text2); flex-shrink: 0; }
  .bars .btrack { flex: 1; height: 9px; border-radius: 3px; background: #081826; overflow: hidden; }
  .bars .bfill { height: 100%; border-radius: 3px; }
  .bars .bval { width: 30px; font-size: 9.5px; font-family: 'JetBrains Mono', monospace; color: var(--muted); text-align: right; flex-shrink: 0; }

  .foot { padding: 10px 16px; border-top: 1px solid var(--border); display: flex; gap: 12px; flex-wrap: wrap; }
  .foot a { font-size: 11px; color: var(--ob-light); text-decoration: none; font-family: 'JetBrains Mono', monospace; }
  .foot a:hover { text-decoration: underline; }

  .maplibregl-popup-content {
    background: var(--bg-card) !important; color: var(--text) !important;
    border: 1px solid var(--border); border-radius: 8px !important;
    font-family: 'DM Sans', sans-serif; font-size: 12px; padding: 10px 12px !important;
    box-shadow: 0 10px 40px rgba(0,0,0,.6) !important;
  }
  .maplibregl-popup-tip { border-top-color: var(--bg-card) !important; border-bottom-color: var(--bg-card) !important; }
  .pp b { font-size: 12.5px; }
  .pp .m { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text2); margin-top: 3px; line-height: 1.6; }
  .pp .m i { color: var(--ob-light); font-style: normal; }
  .pp .m .warn { color: var(--ftr-light); }

  @media (max-width: 720px) {
    .panel { width: auto; right: 14px; bottom: auto; max-height: 55vh; }
  }
</style>
</head>
<body>
<div id="map"></div>

<div class="panel">
  <div class="panel-head">
    <h1>Boston Bikeshare Atlas</h1>
    <div class="sub">insights from 24M+ Bluebikes trips · 2018–2026</div>
  </div>
  <div class="statrow" id="statrow"></div>
  <div class="views" id="views">
    <button class="chip active" data-view="arbitrage">🚏 Last-mile</button>
    <button class="chip" data-view="traffic">🚲 Traffic</button>
    <button class="chip" data-view="stationage">🆕 Station age</button>
    <button class="chip" data-view="freshness">✨ Bike age</button>
    <button class="chip" data-view="equity">🏘 Income</button>
    <button class="chip" data-view="members">🎫 Members</button>
    <button class="chip" data-view="netflow">⚖ Net flow</button>
    <button class="chip" data-view="dockfit">🅿 Dock fit</button>
    <button class="chip" data-view="gaps">🚧 Lane gaps</button>
    <button class="chip" data-view="crashes">🚑 Crashes</button>
    <button class="chip" data-view="proposed">📍 Proposed</button>
    <button class="chip lanes" data-view="__lanes">🛣 Bike lanes</button>
  </div>
  <div class="vhint">layers stack — try 🚑+🚧+🛣 (safety), 🚲+📍 (growth), 🆕+🏘 (equity)</div>
  <div class="story" id="story"></div>
  <div class="foot">
    <a href="../">🚲 Route planner</a>
    <a href="../showcase/">📊 Presentations</a>
    <a href="https://github.com/Krishna-coder6111/blueroute" target="_blank">GitHub</a>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════════════
// Palette (City of Boston brand): blue = supply/positive, red = attention,
// gray = muted. One diverging pair everywhere for legibility.
// ═══════════════════════════════════════════════════════════════════════════
const OB = '#288BE4', OB_L = '#8ABEEE', OB_D = '#1D6DB8';
const FR = '#FB4D42', FR_L = '#FF9C94', FR_D = '#C33325';
const GRAY = '#5d7288', GRAY_D = '#39485a';

const AGE_BINS = [
  { label: 'Core (≤2019)', color: GRAY, test: y => y > 0 && y <= 2019 },
  { label: 'Expansion (2020–23)', color: OB, test: y => y >= 2020 && y <= 2023 },
  { label: 'New (2024–26)', color: FR, test: y => y >= 2024 },
  { label: 'unknown', color: GRAY_D, test: y => y === 0 },
];

const VIEWS = {
  arbitrage: {
    title: 'The "fraud" that turned out to be commuting',
    html: `<p><b>56 station pairs</b> show the anomaly signature: ~2-min hops,
      back-and-forth, ~95% members. But that's also the signature of a
      <b>last-mile hop to transit</b> — so every pair was screened on behavior:
      <b>tidality</b> (commuters flow one way at 8am, back at 5pm) and
      <b>flip sessions</b> (3+ alternating rides within minutes, the true
      points-farming fingerprint).</p>
      <p>Verdict: <b>zero pairs are farming-like</b>. 15 are clearly tidal
      commutes — <span class="stlink" data-st="davis square">Davis Sq</span> ⇄
      <span class="stlink" data-st="teele square">Teele Sq</span> flows toward
      the Red Line in the morning and back at night — and 41 are mixed local
      hops. The biggest pair (Packard's Corner ⇄ Agganis, 20,188 trips) is a
      BU commute corridor. Click any arc for its verdict.</p>`,
    legend: [
      ['line', OB, 'commute-like (tidal, no sessions)'],
      ['line', '#b48ead', 'mixed signals (local hops)'],
      ['line', FR, 'farming-like — none found'],
    ],
  },
  traffic: {
    title: 'A decade of trips, station by station',
    html: `<p>Dot size = total departures since 2018. The <b>Kendall/MIT corridor</b>
      dominates; <span class="stlink" data-st="mit at mass ave">MIT at Mass Ave</span>
      is the single busiest station and
      <span class="stlink" data-st="ruggles t stop">Ruggles T</span> anchors the NEU
      cluster. True door-to-door speeds: <b>≈11 km/h</b> classic, <b>≈15 km/h</b> e-bike.</p>`,
    legend: [['swatch', OB, 'dot size = total trips']],
  },
  stationage: {
    title: 'The system is still growing — fast',
    html: `<p>Each station colored by the year of its <b>first-ever trip</b> (a proxy
      for installation). <b>91 stations arrived in 2025</b> and 18 more already in
      2026 — newest:
      <span class="stlink" data-st="andrew t stop - dorchester ave (east)">Andrew T Stop (Dorchester Ave)</span>,
      June 9, 2026, after
      <span class="stlink" data-st="broad canal way north">Broad Canal Way North</span> and
      <span class="stlink" data-st="125 cambridgepark dr">125 Cambridgepark Dr</span>.</p>
      <p>Filter years below. "≤2018" includes the original 2011-era core (trip
      records begin Jul 2018); 2021 is slightly undercounted (data gap being
      backfilled).</p>`,
    legend: [],
  },
  freshness: {
    title: 'Where the newest bikes live (legacy fleet)',
    html: `<p>Average "birth year" of the <b>bikes</b> docked at each station — not
      the station's age (see 🆕). Computable only pre-2024: bike IDs left the
      published data in the schema change.</p>
      <p><span class="stlink" data-st="salem willows park">Salem</span> (added 2021)
      rides the newest fleet (avg 2020.5); legacy downtown stations like
      <span class="stlink" data-st="beacon st at arlington st">Beacon St at Arlington St</span>
      sit at exactly <b>2018.0</b>.</p>`,
    legend: [
      ['swatch', FR, 'oldest bikes (2018)'],
      ['swatch', FR_L, '2019'],
      ['swatch', OB_L, '2020'],
      ['swatch', OB, 'newest (2020.5+)'],
      ['swatch', GRAY_D, 'no bike-id data'],
    ],
  },
  equity: {
    title: 'Stations & neighborhood income',
    html: `<p>Stations concentrate in <b>lower-income, more diverse tracts</b>: 49%
      of Very-Low-income tracts have stations vs 23% of High-income tracts.
      E-bike usage runs <b>higher in poorer neighborhoods</b> (r = −0.17) and e-bikes
      flow toward them — a <b>commuting equalizer</b> toward wealthy job centers.</p>`,
    legend: [
      ['swatch', FR, 'Very Low (<$55k)'],
      ['swatch', FR_L, 'Low ($55–75k)'],
      ['swatch', GRAY, 'Middle ($75–100k)'],
      ['swatch', OB_L, 'Upper-Mid ($100–130k)'],
      ['swatch', OB, 'High (>$130k)'],
    ],
  },
  netflow: {
    title: 'Where bikes pile up — and vanish',
    html: `<p>Net flow = arrivals − departures over the full record. Commuters ride
      <b>into</b> Kendall and take the T home:
      <span class="stlink" data-st="ames st at main st">Ames St at Main St</span>
      accumulated <b>+20,451</b> bikes while
      <span class="stlink" data-st="mit stata center">MIT Stata</span> ran <b>−9,217</b> —
      240 m apart. This imbalance feeds both the rebalancing crews and the
      points farmers (🎯).</p>`,
    legend: [
      ['swatch', OB, 'chronic surplus (bikes pile up)'],
      ['swatch', GRAY_D, 'balanced'],
      ['swatch', FR, 'chronic deficit (always empty)'],
    ],
  },
  dockfit: {
    title: 'Right-sizing existing stations',
    html: `<p>Capacity vs 2025 demand, judged by the network-wide dock-sizing fit
      (docks ≈ 4.1 + 1.5·ln events). <b>Red = under-docked</b>:
      <span class="stlink" data-st="cambridge st at joy st">Cambridge St at Joy St</span>
      handles <b>140 events/day on 14 docks</b>;
      <span class="stlink" data-st="forsyth st at huntington ave">Forsyth St</span>
      178/day on 15. <b>Light blue = over-docked</b>: 50 stations, some near-dead
      (<span class="stlink" data-st="ashley st at boardman st">Ashley St at Boardman St</span>:
      20 docks, ~0 events/day).</p>
      <p>Dot size = |suggested change|. Click a dot for the numbers.</p>`,
    legend: [
      ['swatch', FR, 'add docks (≥ +4, ≥30 events/day)'],
      ['swatch', OB_L, 'remove docks (≤ −4, quiet)'],
      ['swatch', GRAY_D, 'sized about right'],
    ],
  },
  gaps: {
    title: 'The lanes that need to exist',
    html: `<p><b>Red lines</b> trace heavily-ridden street stretches (top-300 flows,
      395K trips) that are <b>more than 130 m from any bike lane</b> — far enough
      that no parallel facility serves them. Riding on a lane-less street that's
      one short block from the Southwest Corridor doesn't count: those
      "parallel" stretches are muted (that's most of them).</p>
      <p>The honest two-part number: <b>38.8%</b> of routed Boston volume rides on
      streets without their own lane, but only <b>5.3%</b> is truly far from one.
      Where that 5.3% concentrates: <b>Roxbury core, South Boston/Broadway,
      City Point, Mission Hill, East Boston</b>. Faint blue dots = routed volume
      that IS lane-served, for context.</p>`,
    legend: [
      ['line', FR, 'needed lane (width = riders routed)'],
      ['swatch', '#28648E', 'volume on/near existing lanes'],
    ],
  },
  members: {
    title: 'Where riders pay casual rates — the membership pitch map',
    html: `<p>Share of the last 12 months' trips made by <b>casual riders</b>
      (no membership), by 2026 neighborhood. Systemwide: <b>29.3%</b>. The
      catch: downtown casuals are tourists. Toggle <b>rush-hour only</b> below —
      casuals riding <b>Mon–Fri at rush</b> are residents commuting at casual
      prices, the real conversion audience.</p>
      <p><b>Mattapan tops both lists</b> (41.7% casual, 40.3% even at rush) —
      followed by Southern Dorchester, East Boston, Hyde Park + West Roxbury,
      and South Boston. Every one of those riders qualifies-or-close for the
      <b>income-eligible membership: $5/month — or $5/YEAR for Boston
      residents</b> (Boston Bikes Pass). Click a neighborhood or station.</p>`,
    legend: [
      ['swatch', OB_L, 'mostly members (<25% casual)'],
      ['swatch', '#c473b6', '~30% casual'],
      ['swatch', FR, 'high casual share (40%+)'],
      ['swatch', GRAY_D, 'below threshold (dimmed)'],
    ],
  },
  crashes: {
    title: 'A decade of bike crashes, point by point',
    html: `<p><b>3,945 bike crashes</b> from Boston's Vision Zero records
      (2015–2026). <b>67.8% happen on or within 30 m of a bike lane</b> — not
      because lanes are dangerous, but because that's where the riding is
      (no exposure adjustment here; the City's 2025 Bike Lane Crash Analysis
      digs into rates).</p>
      <p>The useful read is the <b>stack</b>: toggle 🚧 Lane gaps and 🛣 Bike
      lanes to see crash clusters along heavily-ridden stretches that still
      have no protection — the strongest case for the needed-lane corridors.</p>`,
    legend: [['swatch', FR, 'bike crash (2015–2026)']],
  },
  proposed: {
    title: 'Where the next 25 stations should go',
    html: `<p>Maximal-covering optimization (Church & ReVelle 1974): 25 sites that
      maximize <b>newly served population</b> within a 500 m walk, existing network
      fixed. Solved to optimality: <b>~107,000 more people (+10%)</b> — Everett/
      Malden, East Boston → Revere, Hyde Park, West Roxbury. Ring size =
      population served; click for suggested docks. Try stacking 🚲 Traffic to
      see how they sit beyond today's demand.</p>`,
    legend: [['swatch', '#ffffff', 'proposed station (ring, size = pop served)']],
  },
};

// ─── State ───────────────────────────────────────────────────────────────────
let map, DATA = {};
const activeViews = new Set(['arbitrage']);
let primaryView = 'arbitrage';
let lanesOn = false, heavyOnly = false;
let activeYears = null;
const LANE_LAYER_IDS = [];
const VIEW_LAYERS = {
  arbitrage: ['arbitrage-glow', 'arbitrage'],
  traffic: ['st-traffic'],
  stationage: ['st-stationage'],
  freshness: ['st-freshness'],
  equity: ['st-equity'],
  netflow: ['st-netflow'],
  dockfit: ['dockfit'],
  gaps: ['gaps-ctx', 'gaps-lines'],
  crashes: ['crashes'],
  members: ['hoods-fill', 'hoods-line', 'st-members'],
  proposed: ['proposed'],
};
let memberProp = 'cas';    // 'cas' | 'rushcas' (rush-hour-only toggle)
let memberThr = 0;         // dim neighborhoods below this casual %

// ─── Utils ───────────────────────────────────────────────────────────────────
function arcPoints(a, b, n = 24, bend = 0.18) {
  const pts = [];
  const mx = (a[0] + b[0]) / 2, my = (a[1] + b[1]) / 2;
  const dx = b[0] - a[0], dy = b[1] - a[1];
  const cx = mx - dy * bend, cy = my + dx * bend;
  for (let i = 0; i <= n; i++) {
    const t = i / n;
    pts.push([
      (1 - t) ** 2 * a[0] + 2 * (1 - t) * t * cx + t ** 2 * b[0],
      (1 - t) ** 2 * a[1] + 2 * (1 - t) * t * cy + t ** 2 * b[1],
    ]);
  }
  return pts;
}
const BUILD = '20260722a';   // bump per deploy — busts stale cached data files
const fyOf = s => { const y = parseInt(s.first); return Number.isFinite(y) ? Math.max(2018, y) : 0; };
const binOf = y => AGE_BINS.find(b => b.test(y)) || AGE_BINS[3];

// ─── Data ────────────────────────────────────────────────────────────────────
async function loadData() {
  const [stations, arbitrage] = await Promise.all([
    fetch(`data/stations.json?v=${BUILD}`).then(r => r.json()),
    fetch(`data/arbitrage.json?v=${BUILD}`).then(r => r.json()),
  ]);
  DATA.stations = stations;
  DATA.arbitrage = arbitrage;
  const opt = async (name) => {
    try { const r = await fetch(`data/${name}?v=${BUILD}`); return r.ok ? await r.json() : null; }
    catch (e) { return null; }
  };
  DATA.lanes = await opt('lanes_all.geojson') || await opt('lanes.geojson');
  DATA.gaps = await opt('lane_gaps.geojson');
  DATA.proposed = await opt('proposed.json');
  DATA.dockfit = await opt('dock_resize.json');
  DATA.crashes = await opt('crashes.json');
  DATA.hoods = await opt('neighborhoods.geojson');
}

function stationGeojson() {
  return {
    type: 'FeatureCollection',
    features: DATA.stations.map(s => ({
      type: 'Feature',
      geometry: { type: 'Point', coordinates: [s.lng, s.lat] },
      properties: {
        n: s.n, cap: s.cap || 0, trips: s.trips || 0, birth: s.birth || 0,
        inc: s.inc || 0, tier: s.tier || '', ebike: s.ebike ?? -1,
        net: s.net ?? 0, first: s.first || '', fy: fyOf(s),
        t12: s.t12 || 0, cas: s.cas ?? -1, rushcas: s.rushcas ?? -1, hood: s.hood || '',
      },
    })),
  };
}

function arbitrageGeojson() {
  return {
    type: 'FeatureCollection',
    features: DATA.arbitrage.map((p, i) => ({
      type: 'Feature',
      geometry: { type: 'LineString', coordinates: arcPoints([p.aLng, p.aLat], [p.bLng, p.bLat]) },
      properties: { i, aN: p.aN, bN: p.bN, trips: p.trips, mins: p.mins, km: p.km, member: p.member, days: p.days,
                    cls: p.cls, tidal: p.tidal, farm: p.farm, first: p.first, last: p.last },
    })),
  };
}

// ─── Layers ──────────────────────────────────────────────────────────────────
function popupRow(p) {
  return [
    p.hood || '',
    p.trips ? `<i>${(+p.trips).toLocaleString()}</i> trips` : '',
    p.t12 ? `<i>${(+p.t12).toLocaleString()}</i> in last 12 mo` : '',
    p.cas >= 0 ? `casual <i>${p.cas}%</i>${p.rushcas >= 0 ? ` (<i>${p.rushcas}%</i> at rush)` : ''}` : '',
    p.first ? `first trip <i>${p.first}</i>` : '',
    p.birth > 0 ? `avg bike birth <i>${(+p.birth).toFixed(1)}</i>` : '',
    p.net ? `net flow <i>${(+p.net).toLocaleString()}</i>` : '',
    p.tier || '',
    p.ebike >= 0 ? `<i>${p.ebike}%</i> e-bike` : '',
    `capacity <i>${p.cap}</i>`,
  ].filter(Boolean).join(' · ');
}

function bindPointer(id) {
  map.on('mouseenter', id, () => map.getCanvas().style.cursor = 'pointer');
  map.on('mouseleave', id, () => map.getCanvas().style.cursor = '');
}

function initLayers() {
  map.addSource('stations', { type: 'geojson', data: stationGeojson() });
  map.addSource('arbitrage', { type: 'geojson', data: arbitrageGeojson() });

  // lanes (bottom)
  if (DATA.lanes) {
    map.addSource('lanes', { type: 'geojson', data: DATA.lanes });
    const laneStyles = {
      separated: { color: '#22c55e', width: 2.4, opacity: 0.85 },
      buffered:  { color: '#2dd4bf', width: 1.9, opacity: 0.8 },
      lane:      { color: '#86efac', width: 1.3, opacity: 0.6 },
      path:      { color: '#57cfc0', width: 1.7, opacity: 0.7, dash: [2.2, 1.8] },
      shared:    { color: '#9aa79b', width: 1.1, opacity: 0.45, dash: [0.4, 1.8] },
    };
    const LANE_LABELS = { separated: 'Separated / protected lane', buffered: 'Buffered lane',
                          lane: 'Conventional bike lane', path: 'Shared-use path',
                          shared: 'Sharrows / shared lane' };
    for (const [t, s] of Object.entries(laneStyles)) {
      const id = `lanes-${t}`;
      LANE_LAYER_IDS.push(id);
      map.addLayer({
        id, type: 'line', source: 'lanes',
        filter: ['==', ['get', 't'], t],
        layout: { visibility: 'none' },
        paint: { 'line-color': s.color, 'line-width': s.width, 'line-opacity': s.opacity,
                 ...(s.dash ? { 'line-dasharray': s.dash } : {}) },
      });
      map.on('click', id, e => {
        const p = e.features[0].properties;
        new maplibregl.Popup().setLngLat(e.lngLat)
          .setHTML(`<div class="pp"><b>${LANE_LABELS[p.t]}</b>
            <div class="m">${p.c ? p.c[0].toUpperCase() + p.c.slice(1) : ''} inventory</div></div>`).addTo(map);
      });
      bindPointer(id);
    }
  }

  // neighborhood casual-share choropleth (under everything else)
  if (DATA.hoods) {
    map.addSource('hoods', { type: 'geojson', data: DATA.hoods });
    map.addLayer({
      id: 'hoods-fill', type: 'fill', source: 'hoods',
      layout: { visibility: 'none' },
      paint: { 'fill-color': casRamp('cas'), 'fill-opacity': 0.42 },
    });
    map.addLayer({
      id: 'hoods-line', type: 'line', source: 'hoods',
      layout: { visibility: 'none' },
      paint: { 'line-color': '#a9bccd', 'line-width': 1, 'line-opacity': 0.5 },
    });
    map.on('click', 'hoods-fill', e => {
      // let station clicks win when overlapping
      if (map.queryRenderedFeatures(e.point, { layers: ['st-members'] }).length) return;
      const p = e.features[0].properties;
      const cas = p.cas >= 0 ? `${p.cas}%` : 'n/a';
      const rc = p.rushcas >= 0 ? `${p.rushcas}%` : 'n/a';
      new maplibregl.Popup().setLngLat(e.lngLat)
        .setHTML(`<div class="pp"><b>${p.n}</b>
          <div class="m"><i>${(+p.trips).toLocaleString()}</i> trips (12 mo) from <i>${p.nst}</i> stations<br>
          casual share <i>${cas}</i> · at weekday rush <i>${rc}</i><br>
          ≈ <i>${(+p.castrips).toLocaleString()}</i> casual trips/yr · station tier: ${p.tier}</div></div>`)
        .addTo(map);
    });
    bindPointer('hoods-fill');
  }

  // lane gaps: context dots + needed-lane lines
  if (DATA.gaps) {
    map.addSource('gaps', { type: 'geojson', data: DATA.gaps });
    map.addLayer({
      id: 'gaps-ctx', type: 'circle', source: 'gaps',
      filter: ['==', ['get', 'gap'], 0],
      layout: { visibility: 'none' },
      paint: { 'circle-radius': 1.8, 'circle-color': '#28648E', 'circle-opacity': 0.35 },
    });
    map.addLayer({
      id: 'gaps-lines', type: 'line', source: 'gaps',
      filter: ['==', ['get', 'gap'], 1],
      layout: { visibility: 'none', 'line-cap': 'round', 'line-join': 'round' },
      paint: {
        'line-color': ['interpolate', ['linear'], ['get', 'v'], 300, FR_L, 3000, FR, 8000, FR_D],
        'line-width': ['interpolate', ['linear'], ['get', 'v'], 300, 2, 3000, 4.5, 8000, 7],
        'line-opacity': 0.9,
      },
    });
    map.on('click', 'gaps-lines', e => {
      const p = e.features[0].properties;
      new maplibregl.Popup().setLngLat(e.lngLat)
        .setHTML(`<div class="pp"><b>Needed lane</b>
          <div class="m"><i>${(+p.v).toLocaleString()}</i> trips/yr routed along this
          unprotected stretch · >130 m from any existing lane</div></div>`).addTo(map);
    });
    bindPointer('gaps-lines');
  }

  // arbitrage arcs
  map.addLayer({
    id: 'arbitrage-glow', type: 'line', source: 'arbitrage',
    paint: {
      'line-color': FR, 'line-opacity': 0.14, 'line-blur': 6,
      'line-width': ['interpolate', ['linear'], ['get', 'trips'], 100, 4, 11000, 16],
    },
  });
  map.addLayer({
    id: 'arbitrage', type: 'line', source: 'arbitrage',
    paint: {
      'line-color': ['match', ['coalesce', ['get', 'cls'], ''],
        'farming-like', FR, 'commute-like', OB, 'mixed', '#b48ead',
        'pre-program', GRAY,
        GRAY],
      'line-opacity': 0.85,
      'line-width': ['interpolate', ['linear'], ['get', 'trips'], 100, 1.2, 2000, 2.8, 11000, 5],
    },
  });
  map.on('click', 'arbitrage', e => {
    const p = e.features[0].properties;
    const CLS_TEXT = {
      'farming-like': '<span class="warn">farming-like</span> — flip sessions, no commute tide',
      'commute-like': '<i>commute-like</i> — tidal AM/PM flow, no flip sessions (last-mile)',
      'mixed': 'mixed signals',
      'pre-program': 'activity concentrated before mid-2023',
    };
    const verdict = p.cls ? `<br>${CLS_TEXT[p.cls] || p.cls} · tide ${p.tidal > 0 ? '+' : ''}${(+p.tidal).toFixed(2)} · ${Math.round(p.farm * 100)}% in flip sessions` : '';
    new maplibregl.Popup().setLngLat(e.lngLat)
      .setHTML(`<div class="pp"><b>${p.aN} ⇄ ${p.bN}</b>
        <div class="m"><i>${(+p.trips).toLocaleString()}</i> trips · avg <i>${p.mins}</i> min ·
        <i>${p.km}</i> km · <i>${p.member}%</i> members · <i>${p.first || ''}</i> → <i>${p.last || ''}</i>${verdict}</div></div>`).addTo(map);
  });
  bindPointer('arbitrage');

  // station views
  const stationPaints = {
    traffic: {
      'circle-radius': ['interpolate', ['linear'], ['sqrt', ['+', ['get', 'trips'], 1]], 0, 1.5, 200, 4, 420, 13],
      'circle-color': OB, 'circle-opacity': 0.7,
    },
    stationage: {
      'circle-radius': 4.5,
      'circle-color': ['case',
        ['==', ['get', 'fy'], 0], GRAY_D,
        ['<=', ['get', 'fy'], 2019], GRAY,
        ['<=', ['get', 'fy'], 2023], OB, FR],
      'circle-opacity': 0.9,
    },
    freshness: {
      'circle-radius': 4.5,
      'circle-color': ['case', ['<=', ['get', 'birth'], 0], GRAY_D,
        ['interpolate', ['linear'], ['get', 'birth'], 2018, FR, 2019, FR_L, 2019.8, OB_L, 2020.5, OB]],
      'circle-opacity': 0.85,
    },
    equity: {
      'circle-radius': 4.5,
      'circle-color': ['match', ['get', 'tier'],
        'Very Low (<$55k)', FR, 'Low ($55-75k)', FR_L,
        'Middle ($75-100k)', GRAY, 'Upper-Mid ($100-130k)', OB_L,
        'High (>$130k)', OB, GRAY_D],
      'circle-opacity': 0.85,
    },
    netflow: {
      'circle-radius': ['interpolate', ['linear'], ['sqrt', ['+', ['abs', ['get', 'net']], 1]], 0, 2, 60, 5, 145, 13],
      'circle-color': ['interpolate', ['linear'], ['get', 'net'], -9000, FR, -400, FR_L, 0, GRAY_D, 800, OB_L, 20000, OB],
      'circle-opacity': 0.8,
    },
  };
  stationPaints.members = {
    'circle-radius': ['interpolate', ['linear'], ['sqrt', ['+', ['get', 't12'], 1]], 0, 1.5, 100, 4, 700, 12],
    'circle-color': casRamp('cas'),
    'circle-opacity': ['case', ['<', ['get', 'cas'], 0], 0.15, 0.9],
  };
  for (const [v, paint] of Object.entries(stationPaints)) {
    map.addLayer({
      id: `st-${v}`, type: 'circle', source: 'stations',
      layout: { visibility: 'none' },
      paint: { ...paint, 'circle-stroke-color': '#0b1b2b', 'circle-stroke-width': 0.8 },
    });
    map.on('click', `st-${v}`, e => {
      const p = e.features[0].properties;
      new maplibregl.Popup().setLngLat(e.lngLat)
        .setHTML(`<div class="pp"><b>${p.n}</b><div class="m">${popupRow(p)}</div></div>`).addTo(map);
    });
    bindPointer(`st-${v}`);
  }

  // dock fit
  if (DATA.dockfit) {
    map.addSource('dockfit', {
      type: 'geojson',
      data: {
        type: 'FeatureCollection',
        features: DATA.dockfit.map(d => ({
          type: 'Feature',
          geometry: { type: 'Point', coordinates: [d.lng, d.lat] },
          properties: d,
        })),
      },
    });
    map.addLayer({
      id: 'dockfit', type: 'circle', source: 'dockfit',
      layout: { visibility: 'none' },
      paint: {
        'circle-radius': ['interpolate', ['linear'], ['abs', ['get', 'd']], 0, 2.5, 6, 6, 12, 10],
        'circle-color': ['match', ['get', 'a'], 'expand', FR, 'shrink', OB_L, GRAY_D],
        'circle-opacity': ['match', ['get', 'a'], 'ok', 0.35, 0.9],
        'circle-stroke-color': '#0b1b2b', 'circle-stroke-width': 0.8,
      },
    });
    map.on('click', 'dockfit', e => {
      const p = e.features[0].properties;
      const verdict = p.a === 'expand' ? `<span class="warn">add ~${p.d} docks</span>`
        : p.a === 'shrink' ? `free up ~${-p.d} docks` : 'sized about right';
      new maplibregl.Popup().setLngLat(e.lngLat)
        .setHTML(`<div class="pp"><b>${p.n}</b>
          <div class="m"><i>${p.cap}</i> docks · <i>${p.epd}</i> events/day (2025) ·
          model fit <i>${p.fit}</i> docks → ${verdict}</div></div>`).addTo(map);
    });
    bindPointer('dockfit');
  }

  // bike crashes (Vision Zero)
  if (DATA.crashes) {
    map.addSource('crashes', {
      type: 'geojson',
      data: {
        type: 'FeatureCollection',
        features: DATA.crashes.map(c => ({
          type: 'Feature',
          geometry: { type: 'Point', coordinates: [c[1], c[0]] },
          properties: { y: c[2] },
        })),
      },
    });
    map.addLayer({
      id: 'crashes', type: 'circle', source: 'crashes',
      layout: { visibility: 'none' },
      paint: {
        'circle-radius': ['interpolate', ['linear'], ['zoom'], 10, 1.6, 14, 3.4],
        'circle-color': FR,
        'circle-opacity': 0.4,
      },
    });
    map.on('click', 'crashes', e => {
      const p = e.features[0].properties;
      new maplibregl.Popup().setLngLat(e.lngLat)
        .setHTML(`<div class="pp"><b>Bike crash</b><div class="m">reported <i>${p.y}</i> · Vision Zero records</div></div>`).addTo(map);
    });
    bindPointer('crashes');
  }

  // proposed (top)
  if (DATA.proposed) {
    map.addSource('proposed', {
      type: 'geojson',
      data: {
        type: 'FeatureCollection',
        features: DATA.proposed.map(p => ({
          type: 'Feature',
          geometry: { type: 'Point', coordinates: [p.lng, p.lat] },
          properties: { pop: p.pop_within_walk, docks: p.suggested_docks },
        })),
      },
    });
    map.addLayer({
      id: 'proposed', type: 'circle', source: 'proposed',
      layout: { visibility: 'none' },
      paint: {
        'circle-radius': ['interpolate', ['linear'], ['get', 'pop'], 500, 5, 5700, 11],
        'circle-color': 'rgba(40,139,228,0.25)',
        'circle-stroke-color': '#ffffff', 'circle-stroke-width': 2,
      },
    });
    map.on('click', 'proposed', e => {
      const p = e.features[0].properties;
      new maplibregl.Popup().setLngLat(e.lngLat)
        .setHTML(`<div class="pp"><b>Proposed station</b>
          <div class="m"><i>${(+p.pop).toLocaleString()}</i> people within 500 m ·
          suggested <i>${p.docks}</i> docks</div></div>`).addTo(map);
    });
    bindPointer('proposed');
  }
}

// ─── View toggling (multi-layer) ────────────────────────────────────────────
function hasView(v) {
  return !((v === 'gaps' && !DATA.gaps) || (v === 'proposed' && !DATA.proposed) ||
           (v === 'dockfit' && !DATA.dockfit) || (v === 'crashes' && !DATA.crashes) ||
           (v === 'members' && !DATA.hoods));
}

// casual-share color ramp shared by neighborhood fills and station dots
function casRamp(prop) {
  return ['case', ['<', ['get', prop], 0], GRAY_D,
    ['interpolate', ['linear'], ['get', prop],
      15, OB, 22, OB_L, 30, '#c473b6', 38, FR_L, 45, FR]];
}

function applyMemberStyle() {
  if (!map.getLayer('hoods-fill')) return;
  map.setPaintProperty('hoods-fill', 'fill-color', casRamp(memberProp));
  map.setPaintProperty('hoods-fill', 'fill-opacity',
    ['case', ['>=', ['get', memberProp], memberThr], 0.42, 0.06]);
  map.setPaintProperty('st-members', 'circle-color', casRamp(memberProp));
}

function syncLayers() {
  for (const [v, ids] of Object.entries(VIEW_LAYERS)) {
    ids.forEach(id => {
      if (map.getLayer(id)) map.setLayoutProperty(id, 'visibility', activeViews.has(v) ? 'visible' : 'none');
    });
  }
  LANE_LAYER_IDS.forEach(id => map.setLayoutProperty(id, 'visibility', lanesOn ? 'visible' : 'none'));
  document.querySelectorAll('.chip:not(.lanes)').forEach(c =>
    c.classList.toggle('active', activeViews.has(c.dataset.view)));
  document.querySelector('.chip.lanes').classList.toggle('active', lanesOn);
}

function toggleView(v) {
  if (!hasView(v)) return;
  if (activeViews.has(v)) {
    activeViews.delete(v);
    if (primaryView === v) primaryView = [...activeViews][0] || null;
  } else {
    activeViews.add(v);
    primaryView = v;
    if (v === 'gaps' && !lanesOn) lanesOn = true;   // gaps need lane context
  }
  syncLayers();
  renderStory();
}

// ─── Filters ─────────────────────────────────────────────────────────────────
function applyYearFilter() {
  if (!map.getLayer('st-stationage')) return;
  if (!activeYears) { map.setFilter('st-stationage', null); return; }
  map.setFilter('st-stationage', ['in', ['get', 'fy'], ['literal', [...activeYears]]]);
}
function applyHeavyFilter() {
  if (!map.getLayer('gaps-lines')) return;
  const base = ['==', ['get', 'gap'], 1];
  map.setFilter('gaps-lines', heavyOnly ? ['all', base, ['>=', ['get', 'v'], 2000]] : base);
}

// ─── Story panel ─────────────────────────────────────────────────────────────
function renderStory() {
  const el = document.getElementById('story');
  if (!primaryView) {
    el.innerHTML = `<p style="margin-top:12px">Toggle a layer above to explore.</p>`;
    return;
  }
  const v = VIEWS[primaryView];
  let html = `<h2>${v.title}</h2>${v.html}`;

  if (primaryView === 'stationage') {
    const counts = {};
    DATA.stations.forEach(s => { const y = fyOf(s); counts[y] = (counts[y] || 0) + 1; });
    const years = [2018, 2019, 2020, 2021, 2022, 2023, 2024, 2025, 2026];
    if (!activeYears) activeYears = new Set([...years, 0]);
    html += `<div class="yearchips">` + years.map(y =>
      `<button class="ychip ${activeYears.has(y) ? 'on' : ''}" data-y="${y}"
        style="${activeYears.has(y) ? 'color:' + binOf(y).color : ''}">${y === 2018 ? '≤2018' : y}</button>`).join('') +
      `<button class="ychip ${activeYears.has(0) ? 'on' : ''}" data-y="0">?</button></div>`;
    const maxC = Math.max(...years.map(y => counts[y] || 0), 1);
    html += `<div class="legend"><div class="ltitle">Stations added per year (of today's ${DATA.stations.length})</div>
      <div class="bars">` + years.map(y =>
      `<div class="brow"><span class="blab">${y === 2018 ? '≤2018' : y}</span>
        <span class="btrack"><span class="bfill" style="width:${(counts[y] || 0) / maxC * 100}%;background:${binOf(y).color}"></span></span>
        <span class="bval">${counts[y] || 0}</span></div>`).join('') + `</div>` +
      AGE_BINS.slice(0, 3).map(b => `<div class="row"><span class="swatch" style="background:${b.color}"></span>${b.label}</div>`).join('') +
      `</div>`;
  }

  if (primaryView === 'gaps') {
    html += `<div class="yearchips">
      <button class="ychip subtoggle ${heavyOnly ? 'on' : ''}" id="heavy-toggle">show heavy corridors only (≥2,000 trips)</button>
    </div>`;
  }

  if (primaryView === 'members') {
    html += `<div class="yearchips">
      <button class="ychip subtoggle ${memberProp === 'rushcas' ? 'on' : ''}" id="rush-toggle">rush-hour casuals only (commuters)</button>
      ${[0, 25, 30, 35].map(t =>
        `<button class="ychip mthr ${memberThr === t ? 'on' : ''}" data-thr="${t}">${t === 0 ? 'all' : '≥' + t + '%'}</button>`).join('')}
    </div>`;
    if (DATA.hoods) {
      const hs = DATA.hoods.features.map(f => f.properties)
        .filter(p => p.trips > 0)
        .sort((a, b) => (b[memberProp] || 0) - (a[memberProp] || 0)).slice(0, 6);
      html += `<div class="toplist">` + hs.map((p, i) =>
        `<div class="item" data-hood="${p.n}">
          <span class="rank">#${i + 1}</span><span>${p.n}</span>
          <span class="val">${p[memberProp]}%</span></div>`).join('') + `</div>`;
    }
  }

  // legends for every active view (stacking-aware)
  for (const av of activeViews) {
    const lv = VIEWS[av];
    if (!lv.legend.length) continue;
    html += `<div class="legend"><div class="ltitle">${lv.title.split('—')[0].trim()}</div>` +
      lv.legend.map(([kind, color, label]) =>
        `<div class="row"><span class="${kind}" style="background:${color}"></span>${label}</div>`).join('') + `</div>`;
  }
  if (lanesOn) {
    html += `<div class="legend"><div class="ltitle">Bike facilities · Boston + Cambridge + Somerville + Brookline</div>
      <div class="row"><span class="line" style="background:#22c55e;height:4px"></span>Separated / protected</div>
      <div class="row"><span class="line" style="background:#2dd4bf;height:3px"></span>Buffered lane</div>
      <div class="row"><span class="line" style="background:#86efac;height:2px"></span>Conventional lane</div>
      <div class="row"><span class="line" style="background:repeating-linear-gradient(90deg,#57cfc0 0 5px,transparent 5px 9px);height:3px"></span>Shared-use path</div>
      <div class="row"><span class="line" style="background:repeating-linear-gradient(90deg,#9aa79b 0 2px,transparent 2px 6px);height:2px"></span>Sharrows / shared</div>
    </div>`;
  }

  if (primaryView === 'arbitrage') {
    const top = [...DATA.arbitrage].sort((a, b) => b.trips - a.trips).slice(0, 5);
    html += `<div class="toplist">` + top.map((p, i) =>
      `<div class="item" data-i="${DATA.arbitrage.indexOf(p)}">
        <span class="rank">#${i + 1}</span>
        <span>${p.aN.split(' - ')[0]} ⇄ ${p.bN.split(' - ')[0]}</span>
        <span class="val">${p.trips.toLocaleString()}</span></div>`).join('') + `</div>`;
  }
  if (primaryView === 'netflow') {
    const st = DATA.stations.filter(s => s.net != null);
    const surplus = [...st].sort((a, b) => (b.net || 0) - (a.net || 0)).slice(0, 3);
    const deficit = [...st].sort((a, b) => (a.net || 0) - (b.net || 0)).slice(0, 3);
    html += `<div class="toplist">` + [...surplus, ...deficit].map(s =>
      `<div class="item" data-fly="${s.lng},${s.lat}">
        <span class="rank" style="color:${s.net > 0 ? OB : FR}">${s.net > 0 ? '▲' : '▼'}</span><span>${s.n}</span>
        <span class="val">${s.net > 0 ? '+' : ''}${s.net.toLocaleString()}</span></div>`).join('') + `</div>`;
  }
  if (primaryView === 'dockfit' && DATA.dockfit) {
    const ex = DATA.dockfit.filter(d => d.a === 'expand').slice(0, 3);
    const sh = DATA.dockfit.filter(d => d.a === 'shrink').slice(-3);
    html += `<div class="toplist">` + [...ex, ...sh].map(d =>
      `<div class="item" data-fly="${d.lng},${d.lat}">
        <span class="rank" style="color:${d.a === 'expand' ? FR : OB_L}">${d.a === 'expand' ? '+' : '−'}</span>
        <span>${d.n}</span><span class="val">${d.epd}/day · ${d.cap}🅿</span></div>`).join('') + `</div>`;
  }

  el.innerHTML = html;

  el.querySelectorAll('.item[data-i]').forEach(item => item.addEventListener('click', () => {
    const p = DATA.arbitrage[+item.dataset.i];
    map.flyTo({ center: [(p.aLng + p.bLng) / 2, (p.aLat + p.bLat) / 2], zoom: 14.5, duration: 900 });
  }));
  el.querySelectorAll('.item[data-fly]').forEach(item => item.addEventListener('click', () => {
    const [lng, lat] = item.dataset.fly.split(',').map(Number);
    map.flyTo({ center: [lng, lat], zoom: 15, duration: 900 });
  }));
  el.querySelectorAll('.stlink').forEach(sp => sp.addEventListener('click', () => {
    const q = sp.dataset.st;
    const st = DATA.stations.find(s => s.n.toLowerCase().includes(q)) ||
               DATA.stations.find(s => q.includes(s.n.toLowerCase()));
    if (!st) return;
    map.flyTo({ center: [st.lng, st.lat], zoom: 15, duration: 900 });
    const bits = [st.trips ? `${st.trips.toLocaleString()} trips` : '',
                  st.first ? `first trip ${st.first}` : '',
                  st.birth ? `avg bike birth ${st.birth}` : '',
                  st.net != null ? `net flow ${st.net > 0 ? '+' : ''}${(st.net || 0).toLocaleString()}` : '']
      .filter(Boolean).join(' · ');
    new maplibregl.Popup().setLngLat([st.lng, st.lat])
      .setHTML(`<div class="pp"><b>${st.n}</b><div class="m">${bits}</div></div>`).addTo(map);
  }));
  el.querySelectorAll('.ychip[data-y]').forEach(c => c.addEventListener('click', () => {
    const y = +c.dataset.y;
    if (activeYears.has(y)) activeYears.delete(y); else activeYears.add(y);
    applyYearFilter();
    renderStory();
  }));
  const ht = el.querySelector('#heavy-toggle');
  if (ht) ht.addEventListener('click', () => { heavyOnly = !heavyOnly; applyHeavyFilter(); renderStory(); });
  const rt = el.querySelector('#rush-toggle');
  if (rt) rt.addEventListener('click', () => {
    memberProp = memberProp === 'cas' ? 'rushcas' : 'cas';
    applyMemberStyle(); renderStory();
  });
  el.querySelectorAll('.ychip.mthr').forEach(c => c.addEventListener('click', () => {
    memberThr = +c.dataset.thr;
    applyMemberStyle(); renderStory();
  }));
  el.querySelectorAll('.item[data-hood]').forEach(item => item.addEventListener('click', () => {
    const f = DATA.hoods.features.find(x => x.properties.n === item.dataset.hood);
    if (!f) return;
    const ring = f.geometry.coordinates[0];
    const lng = ring.reduce((s, c) => s + c[0], 0) / ring.length;
    const lat = ring.reduce((s, c) => s + c[1], 0) / ring.length;
    map.flyTo({ center: [lng, lat], zoom: 13.2, duration: 900 });
  }));
}

function renderStats() {
  document.getElementById('statrow').innerHTML = [
    [DATA.stations.length, 'live stations'],
    ['24M+', 'trips analyzed'],
    [DATA.arbitrage.length, 'last-mile pairs'],
    [DATA.lanes ? DATA.lanes.features.length.toLocaleString() : '—', 'lane segments'],
  ].map(([v, l]) => `<div class="stat"><b>${v}</b><span>${l}</span></div>`).join('');
}

// ─── Init ────────────────────────────────────────────────────────────────────
async function init() {
  map = new maplibregl.Map({
    container: 'map',
    style: 'https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json',
    center: [-71.08, 42.355], zoom: 12.2, attributionControl: { compact: true },
    preserveDrawingBuffer: true,   // enables canvas export for deck screenshots
  });
  map.addControl(new maplibregl.NavigationControl({ showCompass: false }), 'bottom-right');

  const dataReady = loadData();
  let booted = false;
  const boot = async () => {
    if (booted) return;
    booted = true;
    await dataReady;
    renderStats();
    initLayers();
    syncLayers();
    renderStory();
  };
  map.once('load', boot);
  const bootPoll = setInterval(() => {
    if (booted) { clearInterval(bootPoll); return; }
    if (map.isStyleLoaded()) { clearInterval(bootPoll); boot(); }
  }, 2000);

  document.querySelectorAll('.chip').forEach(chip => chip.addEventListener('click', () => {
    const v = chip.dataset.view;
    if (!booted) return;
    if (v === '__lanes') {
      if (!DATA.lanes) return;
      lanesOn = !lanesOn;
      syncLayers();
      renderStory();
    } else toggleView(v);
  }));

  await dataReady;
  if (!booted) renderStats();
}

init();
</script>
</body>
</html>
