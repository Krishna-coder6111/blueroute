<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boston Bikeshare Atlas — insights from 24M Bluebikes trips</title>
<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-deep: #080e17; --bg-panel: #0d1520cc; --bg-card: #111c2b;
    --border: #1c2d42; --text: #e2e8f0; --text2: #8b9cb8; --muted: #4a5f7a;
    --blue: #3b82f6; --bike: #38bdf8; --amber: #f59e0b; --red: #ef4444; --green: #4ade80;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg-deep); color: var(--text); height: 100vh; overflow: hidden; }
  #map { position: absolute; inset: 0; }

  .panel {
    position: absolute; top: 14px; left: 14px; bottom: 14px;
    width: 360px; z-index: 10;
    background: var(--bg-panel); backdrop-filter: blur(12px);
    border: 1px solid var(--border); border-radius: 14px;
    display: flex; flex-direction: column; overflow: hidden;
  }
  .panel-head { padding: 16px 16px 10px; }
  .panel-head h1 {
    font-size: 18px; font-weight: 700;
    background: linear-gradient(90deg, #60a5fa, #a78bfa);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .panel-head .sub { font-size: 10px; color: var(--muted); font-family: 'JetBrains Mono', monospace; letter-spacing: .06em; margin-top: 2px; }

  .statrow { display: flex; gap: 6px; padding: 0 16px 10px; flex-wrap: wrap; }
  .stat { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 5px 9px; }
  .stat b { font-size: 13px; font-family: 'JetBrains Mono', monospace; color: var(--bike); display: block; }
  .stat span { font-size: 8.5px; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; font-family: 'JetBrains Mono', monospace; }

  .views { display: flex; flex-wrap: wrap; gap: 5px; padding: 0 16px 8px; }
  .chip {
    padding: 5px 10px; border-radius: 7px; border: 1px solid var(--border);
    background: transparent; color: var(--muted); font-size: 11px; cursor: pointer;
    font-family: 'JetBrains Mono', monospace; transition: all .15s;
  }
  .chip.active { background: #1a2d44; color: var(--text); border-color: var(--blue); }
  .chip:hover { border-color: var(--muted); }
  .chip.lanes.active { color: var(--green); border-color: #22c55e66; background: #10241a; }

  .story { flex: 1; overflow-y: auto; padding: 4px 16px 16px; }
  .story::-webkit-scrollbar { width: 5px; }
  .story::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  .story h2 { font-size: 13.5px; margin: 10px 0 6px; color: var(--text); }
  .story p { font-size: 12px; line-height: 1.65; color: var(--text2); margin-bottom: 8px; }
  .story p b { color: var(--text); }
  .legend { margin: 8px 0; padding: 9px 11px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 9px; }
  .legend .row { display: flex; align-items: center; gap: 7px; font-size: 10.5px; color: var(--text2); padding: 2px 0; font-family: 'JetBrains Mono', monospace; }
  .legend .swatch { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
  .legend .line { width: 16px; height: 3px; border-radius: 2px; flex-shrink: 0; }

  .toplist { margin-top: 8px; }
  .toplist .item {
    display: flex; align-items: center; gap: 8px;
    padding: 7px 9px; margin-bottom: 5px;
    background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px;
    cursor: pointer; font-size: 11px; color: var(--text2); transition: all .15s;
  }
  .toplist .item:hover { border-color: var(--blue); color: var(--text); }
  .toplist .rank { font-family: 'JetBrains Mono', monospace; font-weight: 800; color: var(--amber); flex-shrink: 0; }
  .toplist .val { margin-left: auto; font-family: 'JetBrains Mono', monospace; color: var(--bike); flex-shrink: 0; }

  .stlink { color: #60a5fa; cursor: pointer; border-bottom: 1px dotted #60a5fa66; }
  .stlink:hover { color: #93c5fd; }

  .yearchips { display: flex; flex-wrap: wrap; gap: 4px; margin: 8px 0; }
  .ychip {
    padding: 3px 8px; border-radius: 6px; font-size: 10px;
    font-family: 'JetBrains Mono', monospace; cursor: pointer;
    border: 1px solid var(--border); color: var(--muted); background: transparent;
  }
  .ychip.on { color: var(--text); border-color: currentColor; }

  .bars { margin: 8px 0; }
  .bars .brow { display: flex; align-items: center; gap: 6px; padding: 1.5px 0; }
  .bars .blab { width: 42px; font-size: 9.5px; font-family: 'JetBrains Mono', monospace; color: var(--text2); flex-shrink: 0; }
  .bars .btrack { flex: 1; height: 9px; border-radius: 3px; background: #0a1220; overflow: hidden; }
  .bars .bfill { height: 100%; border-radius: 3px; }
  .bars .bval { width: 30px; font-size: 9.5px; font-family: 'JetBrains Mono', monospace; color: var(--muted); text-align: right; flex-shrink: 0; }

  .foot { padding: 10px 16px; border-top: 1px solid var(--border); display: flex; gap: 12px; flex-wrap: wrap; }
  .foot a { font-size: 11px; color: var(--bike); text-decoration: none; font-family: 'JetBrains Mono', monospace; }
  .foot a:hover { text-decoration: underline; }

  .maplibregl-popup-content {
    background: var(--bg-card) !important; color: var(--text) !important;
    border: 1px solid var(--border); border-radius: 10px !important;
    font-family: 'DM Sans', sans-serif; font-size: 12px; padding: 10px 12px !important;
    box-shadow: 0 10px 40px rgba(0,0,0,.6) !important;
  }
  .maplibregl-popup-tip { border-top-color: var(--bg-card) !important; border-bottom-color: var(--bg-card) !important; }
  .pp b { font-size: 12.5px; }
  .pp .m { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text2); margin-top: 3px; }
  .pp .m i { color: var(--bike); font-style: normal; }

  @media (max-width: 720px) {
    .panel { width: auto; right: 14px; bottom: auto; max-height: 52vh; }
  }
</style>
</head>
<body>
<div id="map"></div>

<div class="panel">
  <div class="panel-head">
    <h1>Boston Bikeshare Atlas</h1>
    <div class="sub">insights from 24M+ Bluebikes trips · 2018–2026</div>
  </div>
  <div class="statrow" id="statrow"></div>
  <div class="views" id="views">
    <button class="chip active" data-view="arbitrage">🎯 Points arbitrage</button>
    <button class="chip" data-view="traffic">🚲 Traffic</button>
    <button class="chip" data-view="stationage">🆕 Station age</button>
    <button class="chip" data-view="freshness">✨ Bike age</button>

    <button class="chip" data-view="proposed">📍 Proposed</button>
    <button class="chip lanes" data-view="__lanes">🛣 Bike lanes</button>
  </div>
  <div class="story" id="story"></div>
  <div class="foot">
    <a href="../">🚲 Route planner</a>
    <a href="../showcase/">📊 Presentations</a>
    <a href="https://github.com/Krishna-coder6111/blueroute" target="_blank">GitHub</a>

</div>

<script>
const VIEWS = {

      <p>E-bike usage is <b>higher in poorer neighborhoods</b> (r = −0.17), and e-bikes

      <p>Top gap corridors: <b>Roxbury/Melnea Cass</b>, <b>Nubian Square</b>,

      Only City-of-Boston streets are ranked (other cities' inventories are
      separate); the OSRM router already prefers lanes, so gap volume is a
      <b>lower bound</b> on demand. Toggle 🛣 for the lane network.</p>`,
    legend: [
      ['swatch', '#38bdf866', 'routed volume, on/near a lane'],
      ['swatch', '#f59e0b', 'gap — moderate volume, no lane'],

    title: 'Where the next 25 stations should go',
    html: `<p>Maximal-covering optimization (Church & ReVelle 1974): pick 25

      ['swatch', '#4ade80', 'proposed station (size = population served)'],

  },
  netflow: {
    title: 'Where bikes pile up — and vanish',
    html: `<p>Net flow = arrivals − departures over the full record. Commuters ride
      <b>into</b> Kendall each morning and take the T home:
      <span class="stlink" data-st="ames st at main st">Ames St at Main St</span>
      accumulated a +20,451 bike surplus while
      <span class="stlink" data-st="mit stata center">MIT Stata</span> ran a −9,217 deficit —
      240 meters apart.</p>
      <p>That imbalance is what the rewards program (and its gamers) feed on, and
      what rebalancing crews chase daily. ~58 bikes/month also degrade into a
      faulty state (≈$70K/yr repair burden).</p>`,
    legend: [
      ['swatch', '#fbbf24', 'chronic surplus (bikes pile up)'],
      ['swatch', '#475569', 'balanced'],
      ['swatch', '#ef4444', 'chronic deficit (always empty)'],
    ],
  },
};

let map, DATA = {}, currentView = 'arbitrage', lanesOn = false;
const LANE_LAYER_IDS = [];
let activeYears = null;   // Set of first-trip years shown in station-age view

function arcPoints(a, b, n = 24, bend = 0.18) {
  const pts = [];
  const mx = (a[0] + b[0]) / 2, my = (a[1] + b[1]) / 2;
  const dx = b[0] - a[0], dy = b[1] - a[1];
  const cx = mx - dy * bend, cy = my + dx * bend;
  for (let i = 0; i <= n; i++) {
    const t = i / n;
    pts.push([
      (1 - t) ** 2 * a[0] + 2 * (1 - t) * t * cx + t ** 2 * b[0],
      (1 - t) ** 2 * a[1] + 2 * (1 - t) * t * cy + t ** 2 * b[1],
    ]);
  }
  return pts;
}

async function loadData() {
  const [stations, arbitrage] = await Promise.all([
    fetch('data/stations.json').then(r => r.json()),
    fetch('data/arbitrage.json').then(r => r.json()),
  ]);
  DATA.stations = stations;
  DATA.arbitrage = arbitrage;
  try {
    let r = await fetch('data/lanes_all.geojson');           // Boston + Cambridge
    if (!r.ok) r = await fetch('data/lanes.geojson');        // Boston only
    DATA.lanes = await r.json();
  } catch (e) {}
  try { DATA.gaps = await fetch('data/lane_gaps.geojson').then(r => r.ok ? r.json() : null); } catch (e) {}
  try { DATA.proposed = await fetch('data/proposed.json').then(r => r.ok ? r.json() : null); } catch (e) {}
}

function stationGeojson() {
  return {
    type: 'FeatureCollection',
    features: DATA.stations.map(s => ({
      type: 'Feature',
      geometry: { type: 'Point', coordinates: [s.lng, s.lat] },
      properties: {
        n: s.n, cap: s.cap || 0, trips: s.trips || 0, birth: s.birth || 0,
        inc: s.inc || 0, tier: s.tier || '', ebike: s.ebike ?? -1,
        net: s.net ?? 0, first: s.first || '',
        fy: s.first ? Math.max(2018, +s.first.slice(0, 4)) : 0,
      },
    })),
  };
}

function arbitrageGeojson() {
  return {
    type: 'FeatureCollection',
    features: DATA.arbitrage.map((p, i) => ({
      type: 'Feature',
      geometry: { type: 'LineString', coordinates: arcPoints([p.aLng, p.aLat], [p.bLng, p.bLat]) },
      properties: { i, aN: p.aN, bN: p.bN, trips: p.trips, mins: p.mins, km: p.km, member: p.member, days: p.days },
    })),
  };
}

function initLayers() {
  map.addSource('stations', { type: 'geojson', data: stationGeojson() });
  map.addSource('arbitrage', { type: 'geojson', data: arbitrageGeojson() });
  if (DATA.lanes) map.addSource('lanes', { type: 'geojson', data: DATA.lanes });

  if (DATA.lanes) {
    // one layer per facility class so dash patterns can differ
    const laneStyles = {
      separated: { color: '#22c55e', width: 2.4, opacity: 0.85 },
      buffered:  { color: '#2dd4bf', width: 1.9, opacity: 0.8 },
      lane:      { color: '#86efac', width: 1.3, opacity: 0.65 },
      path:      { color: '#38bdf8', width: 1.7, opacity: 0.75, dash: [2.2, 1.8] },
      shared:    { color: '#a3a3a3', width: 1.1, opacity: 0.5, dash: [0.4, 1.8] },
    };
    const LANE_LABELS = { separated: 'Separated / protected lane', buffered: 'Buffered lane',
                          lane: 'Conventional bike lane', path: 'Shared-use path',
                          shared: 'Sharrows / shared lane' };
    LANE_LAYER_IDS.length = 0;
    for (const [t, s] of Object.entries(laneStyles)) {
      const id = `lanes-${t}`;
      LANE_LAYER_IDS.push(id);
      map.addLayer({
        id, type: 'line', source: 'lanes',
        filter: ['==', ['get', 't'], t],
        layout: { visibility: 'none' },
        paint: {
          'line-color': s.color, 'line-width': s.width, 'line-opacity': s.opacity,
          ...(s.dash ? { 'line-dasharray': s.dash } : {}),
        },
      });
      map.on('click', id, e => {
        const p = e.features[0].properties;
        new maplibregl.Popup().setLngLat(e.lngLat)
          .setHTML(`<div class="pp"><b>${LANE_LABELS[p.t] || p.t}</b>
            <div class="m">${p.c ? p.c[0].toUpperCase() + p.c.slice(1) : ''} inventory</div></div>`)
          .addTo(map);
      });
    }
  }

  if (DATA.gaps) {
    map.addSource('gaps', { type: 'geojson', data: DATA.gaps });
    map.addLayer({
      id: 'gaps', type: 'circle', source: 'gaps',
      layout: { visibility: 'none' },
      paint: {
        'circle-radius': ['interpolate', ['linear'], ['get', 'v'], 200, 1.6, 3000, 3.2, 15000, 6],
        'circle-color': ['case',
          ['==', ['get', 'gap'], 0], '#38bdf8',
          ['==', ['get', 'gap'], 2], '#64748b',
          ['interpolate', ['linear'], ['get', 'v'], 200, '#f59e0b', 8000, '#ef4444']],
        'circle-opacity': ['case',
          ['==', ['get', 'gap'], 0], 0.25,
          ['==', ['get', 'gap'], 2], 0.2, 0.85],
      },
    });
  }
  if (DATA.proposed) {
    map.addSource('proposed', {
      type: 'geojson',
      data: {
        type: 'FeatureCollection',
        features: DATA.proposed.map(p => ({
          type: 'Feature',
          geometry: { type: 'Point', coordinates: [p.lng, p.lat] },
          properties: { pop: p.pop_within_walk, docks: p.suggested_docks },
        })),
      },
    });
    map.addLayer({
      id: 'proposed', type: 'circle', source: 'proposed',
      layout: { visibility: 'none' },
      paint: {
        'circle-radius': ['interpolate', ['linear'], ['get', 'pop'], 500, 5, 5700, 11],
        'circle-color': '#4ade8033',
        'circle-stroke-color': '#4ade80', 'circle-stroke-width': 2,
      },
    });
    map.on('click', 'proposed', e => {
      const p = e.features[0].properties;
      new maplibregl.Popup().setLngLat(e.lngLat)
        .setHTML(`<div class="pp"><b>Proposed station</b>
          <div class="m"><i>${(+p.pop).toLocaleString()}</i> people within 500 m ·
          suggested <i>${p.docks}</i> docks</div></div>`).addTo(map);
    });
    map.on('mouseenter', 'proposed', () => map.getCanvas().style.cursor = 'pointer');
    map.on('mouseleave', 'proposed', () => map.getCanvas().style.cursor = '');
  }

  map.addLayer({
    id: 'arbitrage-glow', type: 'line', source: 'arbitrage',
    paint: {
      'line-color': '#f59e0b', 'line-opacity': 0.15,
      'line-width': ['interpolate', ['linear'], ['get', 'trips'], 100, 4, 11000, 16],
      'line-blur': 6,
    },
  });
  map.addLayer({
    id: 'arbitrage', type: 'line', source: 'arbitrage',
    paint: {
      'line-color': ['interpolate', ['linear'], ['get', 'trips'], 100, '#fbbf24', 2000, '#f97316', 11000, '#ef4444'],
      'line-opacity': 0.85,
      'line-width': ['interpolate', ['linear'], ['get', 'trips'], 100, 1, 2000, 2.5, 11000, 5],
    },
  });

  const views = {
    stationage: {
      'circle-radius': 4.5,
      'circle-color': ['case', ['==', ['get', 'fy'], 0], '#334155',
        ['interpolate', ['linear'], ['get', 'fy'],
          2018, '#64748b', 2019, '#60a5fa', 2020, '#38bdf8', 2021, '#2dd4bf',
          2022, '#4ade80', 2023, '#facc15', 2024, '#f59e0b', 2025, '#f97316', 2026, '#ef4444']],
      'circle-opacity': 0.9,
    },
    traffic: {
      'circle-radius': ['interpolate', ['linear'], ['sqrt', ['+', ['get', 'trips'], 1]], 0, 1.5, 200, 4, 420, 13],
      'circle-color': '#38bdf8', 'circle-opacity': 0.75,
    },
    freshness: {
      'circle-radius': 4.5,
      'circle-color': ['case', ['<=', ['get', 'birth'], 0], '#334155',
        ['interpolate', ['linear'], ['get', 'birth'], 2018, '#ef4444', 2019, '#f59e0b', 2020, '#facc15', 2020.5, '#4ade80']],
      'circle-opacity': 0.85,
    },
    equity: {
      'circle-radius': 4.5,
      'circle-color': ['match', ['get', 'tier'],
        'Very Low (<$55k)', '#ef4444', 'Low ($55-75k)', '#f59e0b',
        'Middle ($75-100k)', '#9ca3af', 'Upper-Mid ($100-130k)', '#60a5fa',
        'High (>$130k)', '#2563eb', '#334155'],
      'circle-opacity': 0.85,
    },
    netflow: {
      'circle-radius': ['interpolate', ['linear'], ['sqrt', ['+', ['abs', ['get', 'net']], 1]], 0, 2, 60, 5, 145, 13],
      'circle-color': ['interpolate', ['linear'], ['get', 'net'], -9000, '#ef4444', 0, '#475569', 20000, '#fbbf24'],
      'circle-opacity': 0.8,
    },
  };
  for (const [id, paint] of Object.entries(views)) {
    map.addLayer({
      id: `st-${id}`, type: 'circle', source: 'stations',
      layout: { visibility: 'none' },
      paint: { ...paint, 'circle-stroke-color': '#0d1520', 'circle-stroke-width': 0.8 },
    });
    map.on('click', `st-${id}`, e => {
      const p = e.features[0].properties;
      const rows = [
        p.trips ? `<i>${(+p.trips).toLocaleString()}</i> trips` : '',
        p.birth > 0 ? `avg bike birth <i>${(+p.birth).toFixed(1)}</i>` : '',
        p.net ? `net flow <i>${(+p.net).toLocaleString()}</i>` : '',
        p.tier ? `${p.tier}` : '',
        p.ebike >= 0 ? `<i>${p.ebike}%</i> e-bike` : '',
        p.first ? `first trip <i>${p.first}</i>` : '',
        `capacity <i>${p.cap}</i>`,
      ].filter(Boolean).join(' · ');
      new maplibregl.Popup().setLngLat(e.lngLat)
        .setHTML(`<div class="pp"><b>${p.n}</b><div class="m">${rows}</div></div>`).addTo(map);
    });
    map.on('mouseenter', `st-${id}`, () => map.getCanvas().style.cursor = 'pointer');
    map.on('mouseleave', `st-${id}`, () => map.getCanvas().style.cursor = '');
  }

  map.on('click', 'arbitrage', e => {
    const p = e.features[0].properties;
    new maplibregl.Popup().setLngLat(e.lngLat)
      .setHTML(`<div class="pp"><b>${p.aN} ⇄ ${p.bN}</b>
        <div class="m"><i>${(+p.trips).toLocaleString()}</i> flips · avg <i>${p.mins}</i> min ·
        <i>${p.km}</i> km · <i>${p.member}%</i> members · active <i>${p.days}</i> days</div></div>`)
      .addTo(map);
  });
  map.on('mouseenter', 'arbitrage', () => map.getCanvas().style.cursor = 'pointer');
  map.on('mouseleave', 'arbitrage', () => map.getCanvas().style.cursor = '');
}

function setView(view) {
  if ((view === 'gaps' && !DATA.gaps) || (view === 'proposed' && !DATA.proposed)) return;
  currentView = view;
  ['arbitrage-glow', 'arbitrage'].forEach(id =>
    map.setLayoutProperty(id, 'visibility', view === 'arbitrage' ? 'visible' : 'none'));
  ['stationage', 'traffic', 'freshness', 'equity', 'netflow'].forEach(v =>
    map.setLayoutProperty(`st-${v}`, 'visibility', v === view ? 'visible' : 'none'));
  if (DATA.gaps) map.setLayoutProperty('gaps', 'visibility', view === 'gaps' ? 'visible' : 'none');
  if (DATA.proposed) map.setLayoutProperty('proposed', 'visibility', view === 'proposed' ? 'visible' : 'none');
  if (view === 'gaps' && !lanesOn) document.querySelector('.chip.lanes')?.click();
  document.querySelectorAll('.chip:not(.lanes)').forEach(c =>
    c.classList.toggle('active', c.dataset.view === view));
  renderStory();
}

const YEAR_COLORS = { 2018: '#64748b', 2019: '#60a5fa', 2020: '#38bdf8', 2021: '#2dd4bf',
                      2022: '#4ade80', 2023: '#facc15', 2024: '#f59e0b', 2025: '#f97316', 2026: '#ef4444' };

function applyYearFilter() {
  if (!map.getLayer('st-stationage')) return;
  if (!activeYears) { map.setFilter('st-stationage', null); return; }
  map.setFilter('st-stationage', ['in', ['get', 'fy'], ['literal', [...activeYears]]]);
}

function renderStory() {
  const v = VIEWS[currentView];
  let html = `<h2>${v.title}</h2>${v.html}`;
  if (v.legend.length) {
    html += `<div class="legend">` + v.legend.map(([kind, color, label]) =>
      `<div class="row"><span class="${kind}" style="background:${color}"></span>${label}</div>`).join('') + `</div>`;
  }

  if (currentView === 'stationage') {
    const counts = {};
    DATA.stations.forEach(s => {
      const y = s.first ? Math.max(2018, +s.first.slice(0, 4)) : 0;
      counts[y] = (counts[y] || 0) + 1;
    });
    const years = Object.keys(YEAR_COLORS).map(Number);
    if (!activeYears) activeYears = new Set([...years, 0]);
    html += `<div class="yearchips">` + years.map(y =>
      `<button class="ychip ${activeYears.has(y) ? 'on' : ''}" data-y="${y}"
        style="${activeYears.has(y) ? 'color:' + YEAR_COLORS[y] : ''}">${y === 2018 ? '≤2018' : y}</button>`).join('') +
      `<button class="ychip ${activeYears.has(0) ? 'on' : ''}" data-y="0">?</button></div>`;
    const maxC = Math.max(...years.map(y => counts[y] || 0), 1);
    html += `<div class="legend"><div style="font-size:9px;color:var(--muted);font-family:'JetBrains Mono',monospace;
      text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px">Stations added per year (of today's ${DATA.stations.length})</div>
      <div class="bars">` + years.map(y =>
      `<div class="brow"><span class="blab">${y === 2018 ? '≤2018' : y}</span>
        <span class="btrack"><span class="bfill" style="width:${(counts[y] || 0) / maxC * 100}%;background:${YEAR_COLORS[y]}"></span></span>
        <span class="bval">${counts[y] || 0}</span></div>`).join('') + `</div></div>`;
  }

  if (lanesOn) {
    html += `<div class="legend"><div style="font-size:9px;color:var(--muted);font-family:'JetBrains Mono',monospace;
      text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px">Bike facilities · Boston + Cambridge + Somerville + Brookline</div>
      <div class="row"><span class="line" style="background:#22c55e;height:4px"></span>Separated / protected</div>
      <div class="row"><span class="line" style="background:#2dd4bf;height:3px"></span>Buffered lane</div>
      <div class="row"><span class="line" style="background:#86efac;height:2px"></span>Conventional lane</div>
      <div class="row"><span class="line" style="background:repeating-linear-gradient(90deg,#38bdf8 0 5px,transparent 5px 9px);height:3px"></span>Shared-use path</div>
      <div class="row"><span class="line" style="background:repeating-linear-gradient(90deg,#a3a3a3 0 2px,transparent 2px 6px);height:2px"></span>Sharrows / shared</div>
    </div>`;
  }

  if (currentView === 'arbitrage') {
    const top = [...DATA.arbitrage].sort((a, b) => b.trips - a.trips).slice(0, 5);
    html += `<div class="toplist">` + top.map((p, i) =>
      `<div class="item" data-i="${DATA.arbitrage.indexOf(p)}">
        <span class="rank">#${i + 1}</span>
        <span>${p.aN.split(' - ')[0]} ⇄ ${p.bN.split(' - ')[0]}</span>
        <span class="val">${p.trips.toLocaleString()}</span></div>`).join('') + `</div>`;
  }
  if (currentView === 'netflow') {
    const st = DATA.stations.filter(s => s.net != null);
    const surplus = [...st].sort((a, b) => (b.net || 0) - (a.net || 0)).slice(0, 3);
    const deficit = [...st].sort((a, b) => (a.net || 0) - (b.net || 0)).slice(0, 3);
    html += `<div class="toplist">` + [...surplus, ...deficit].map(s =>
      `<div class="item" data-fly="${s.lng},${s.lat}">
        <span class="rank">${s.net > 0 ? '▲' : '▼'}</span><span>${s.n}</span>
        <span class="val">${s.net > 0 ? '+' : ''}${s.net.toLocaleString()}</span></div>`).join('') + `</div>`;
  }
  const el = document.getElementById('story');
  el.innerHTML = html;
  el.querySelectorAll('.item[data-i]').forEach(item => item.addEventListener('click', () => {
    const p = DATA.arbitrage[+item.dataset.i];
    map.flyTo({ center: [(p.aLng + p.bLng) / 2, (p.aLat + p.bLat) / 2], zoom: 14.5, duration: 900 });
  }));
  el.querySelectorAll('.item[data-fly]').forEach(item => item.addEventListener('click', () => {
    const [lng, lat] = item.dataset.fly.split(',').map(Number);
    map.flyTo({ center: [lng, lat], zoom: 14.5, duration: 900 });
  }));
  // clickable station mentions: fly to + popup
  el.querySelectorAll('.stlink').forEach(sp => sp.addEventListener('click', () => {
    const q = sp.dataset.st;
    const st = DATA.stations.find(s => s.n.toLowerCase().includes(q)) ||
               DATA.stations.find(s => q.includes(s.n.toLowerCase()));
    if (!st) return;
    map.flyTo({ center: [st.lng, st.lat], zoom: 15, duration: 900 });
    const bits = [st.trips ? `${st.trips.toLocaleString()} trips` : '',
                  st.first ? `first trip ${st.first}` : '',
                  st.birth ? `avg bike birth ${st.birth}` : '',
                  st.net != null ? `net flow ${st.net > 0 ? '+' : ''}${st.net.toLocaleString()}` : '']
      .filter(Boolean).join(' · ');
    new maplibregl.Popup().setLngLat([st.lng, st.lat])
      .setHTML(`<div class="pp"><b>${st.n}</b><div class="m">${bits}</div></div>`).addTo(map);
  }));
  // station-age year filter chips
  el.querySelectorAll('.ychip').forEach(c => c.addEventListener('click', () => {
    const y = +c.dataset.y;
    if (activeYears.has(y)) activeYears.delete(y); else activeYears.add(y);
    applyYearFilter();
    renderStory();
  }));
}

function renderStats() {
  const trips = DATA.stations.reduce((s, x) => s + (x.trips || 0), 0);
  document.getElementById('statrow').innerHTML = [
    [DATA.stations.length, 'live stations'],
    ['24M+', 'trips 2018–26'],
    [DATA.arbitrage.length, 'arbitrage pairs'],
    [DATA.lanes ? DATA.lanes.features.length.toLocaleString() : '—', 'lane segments'],
  ].map(([v, l]) => `<div class="stat"><b>${v}</b><span>${l}</span></div>`).join('');
}

async function init() {
  map = new maplibregl.Map({
    container: 'map',
    style: 'https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json',
    center: [-71.08, 42.355], zoom: 12.2, attributionControl: { compact: true },
  });
  map.addControl(new maplibregl.NavigationControl({ showCompass: false }), 'bottom-right');
  // register 'load' synchronously (map.loaded() is unreliable while tiles
  // stream) + poll isStyleLoaded() as fallback for renderers where the
  // 'load' event stalls; layer creation gates on the data promise
  const dataReady = loadData();
  let booted = false;
  const boot = async () => {
    if (booted) return;
    booted = true;
    await dataReady;
    renderStats();
    initLayers();
    setView('arbitrage');
  };
  map.once('load', boot);
  const bootPoll = setInterval(() => {
    if (booted) { clearInterval(bootPoll); return; }
    if (map.isStyleLoaded()) { clearInterval(bootPoll); boot(); }
  }, 2000);
  await dataReady;
  if (!booted) renderStats();

  document.querySelectorAll('.chip').forEach(chip => chip.addEventListener('click', () => {
    const v = chip.dataset.view;
    if (v === '__lanes') {
      if (!DATA.lanes) return;
      lanesOn = !lanesOn;
      chip.classList.toggle('active', lanesOn);
      LANE_LAYER_IDS.forEach(id => map.setLayoutProperty(id, 'visibility', lanesOn ? 'visible' : 'none'));
      renderStory();
    } else setView(v);
  }));
}

init();
</script>
</body>
</html>
